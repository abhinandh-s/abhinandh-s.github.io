<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hello Wasm</title>
    <link href="style.css" rel="stylesheet">
  </head>
  <body>
    <h3>  Hello, I'am    </h3>
    <h1 id="output">Loading...</h1>
    <script type="module">
      import init, { hello, about_me } from "./pkg/wasm_site.js";

      async function run() {

        await init();
        document.getElementById("output").textContent = hello();
        document.getElementById("about_me").textContent = about_me();
      }

      run();
    </script>

    
    <h2>
      <span id="typing"></span><span class="cursor">|</span>
    </h2>

    <script type="module">
      const phrases = [
    "Rust Developer",
    "WebAssembly Enthusiast",
    "Backend Engineer"
  ];

  let p = 0, i = 0;
  const el = document.getElementById("typing");

  function type() {
    if (i < phrases[p].length) {
      el.textContent += phrases[p][i++];
      setTimeout(type, 80);
    } else {
      setTimeout(erase, 1500);
    }
  }

  function erase() {
    if (i > 0) {
      el.textContent = el.textContent.slice(0, --i);
      setTimeout(erase, 50);
    } else {
      p = (p + 1) % phrases.length;
      type();
    }
  }

  type();
    </script>


<h4>
Welcome to my corner of Internet
</h4>              
    
    <h1>About Me.</h1>
    <p id="about_me"></p>

  </body>
</html>
